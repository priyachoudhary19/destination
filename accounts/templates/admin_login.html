{% extends 'base.html' %}

{% block content %}

<section class="auth-shell admin-shell">
    <div class="admin-login-card mx-auto">
        <div class="admin-login-head">
            <h3>Login</h3>
        </div>

        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}

        <form method="POST" class="mt-3" autocomplete="off">
            {% csrf_token %}
            <input type="hidden" name="next" value="{{ next|default:'' }}">
            <input type="text" name="admin_portal_fake_username" autocomplete="username" tabindex="-1" class="visually-hidden" aria-hidden="true">
            <input type="password" name="admin_portal_fake_password" autocomplete="new-password" tabindex="-1" class="visually-hidden" aria-hidden="true">
            <div class="mb-3">
                <label class="form-label">Username</label>
                <input type="text" 
                    name="username" 
                    class="form-control" 
                    placeholder="Username" 
                    autocomplete="off"
                    autocapitalize="off"
                    autocorrect="off"
                    spellcheck="false"
                    data-lpignore="true"
                    data-form-type="other"
                    required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" 
                    name="password" 
                    class="form-control" 
                    placeholder="Enter password" 
                    autocomplete="new-password"
                    data-lpignore="true"
                    data-1p-ignore="true"
                    data-form-type="other"
                    readonly
                    onfocus="this.removeAttribute('readonly');"
                    required>
            </div>
            <button type="submit" class="btn btn-primary w-100 auth-btn">Login to Admin Portal</button>
        </form>
    </div>
</section>

{% endblock %}
